<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bot</title>
    <!-- Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 代码高亮库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
        }

        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .chat-header {
            padding: 20px;
            background: #4a90d9;
            color: white;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #4a90d9;
            color: white;
        }

        .message.assistant .message-content {
            background: #e9ecef;
            color: #333;
        }

        /* Markdown 渲染样式 */
        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4,
        .message-content h5,
        .message-content h6 {
            margin-top: 1em;
            margin-bottom: 0.5em;
            font-weight: bold;
        }

        .message-content h1 { font-size: 1.5em; }
        .message-content h2 { font-size: 1.3em; }
        .message-content h3 { font-size: 1.1em; }

        .message-content p {
            margin: 0.5em 0;
            white-space: pre-wrap;
        }

        .message-content ul,
        .message-content ol {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }

        .message-content li {
            margin: 0.25em 0;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
        }

        .message-content pre {
            margin: 0.5em 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .message-content pre code {
            display: block;
            padding: 12px;
            background: #1e1e1e;
            color: #d4d4d4;
            overflow-x: auto;
            font-size: 0.85em;
            line-height: 1.5;
        }

        .message-content blockquote {
            margin: 0.5em 0;
            padding: 0.5em 1em;
            border-left: 3px solid #4a90d9;
            background: rgba(74, 144, 217, 0.1);
        }

        .message-content table {
            border-collapse: collapse;
            margin: 0.5em 0;
            width: 100%;
        }

        .message-content th,
        .message-content td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        .message-content th {
            background: #f5f5f5;
        }

        .message-content a {
            color: #4a90d9;
            text-decoration: none;
        }

        .message-content a:hover {
            text-decoration: underline;
        }

        .message-content hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 1em 0;
        }

        /* 用户消息中的代码块样式 */
        .message.user .message-content code {
            background: rgba(255, 255, 255, 0.2);
        }

        .message.user .message-content pre code {
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-input-container {
            padding: 20px;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }

        .chat-input:focus {
            border-color: #4a90d9;
        }

        .send-button {
            padding: 12px 24px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
        }

        .send-button:hover {
            background: #3a7bc8;
        }

        .send-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: #e9ecef;
            border-radius: 16px;
            margin-bottom: 16px;
            width: fit-content;
        }

        .typing-indicator.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Chat Bot</h1>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="typing-indicator" id="typingIndicator">AI 正在输入...</div>
        </div>
        
        <div class="chat-input-container">
            <input 
                type="text" 
                class="chat-input" 
                id="messageInput" 
                placeholder="输入消息..."
                autocomplete="off"
            >
            <button class="send-button" id="sendButton">发送</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');

        // 配置 marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (e) {}
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,  // 支持 GitHub 风格的换行
            gfm: true      // 支持 GitHub Flavored Markdown
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            // 先转义 HTML，然后解析 Markdown
            return marked.parse(text);
        }

        function addMessage(content, role, isMarkdown = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (isMarkdown && role === 'assistant') {
                contentDiv.innerHTML = renderMarkdown(content);
                // 高亮代码块
                contentDiv.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            } else {
                contentDiv.textContent = content;
            }
            
            messageDiv.appendChild(contentDiv);
            chatMessages.insertBefore(messageDiv, typingIndicator);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return contentDiv;
        }

        function updateMessage(element, content) {
            element.innerHTML = renderMarkdown(content);
            // 高亮代码块
            element.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            // 添加用户消息
            addMessage(content, 'user', false);
            
            messageInput.value = '';
            sendButton.disabled = true;
            typingIndicator.classList.add('show');

            try {
                // 使用流式接口
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: content })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                let assistantMessage = '';
                let messageElement = null;

                // 读取流式数据
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                
                                if (data.type === 'content') {
                                    // 流式内容
                                    typingIndicator.classList.remove('show');
                                    
                                    assistantMessage = data.accumulated;
                                    
                                    if (!messageElement) {
                                        messageElement = addMessage('', 'assistant');
                                    }
                                    
                                    updateMessage(messageElement, assistantMessage);
                                    
                                } else if (data.type === 'dangerous_command') {
                                    // 危险命令,显示确认对话框
                                    typingIndicator.classList.remove('show');
                                    
                                    const confirmed = confirm(
                                        `${data.message}\n\n命令: ${data.command}\n\n是否执行?`
                                    );
                                    
                                    if (confirmed) {
                                        // 用户确认,执行命令
                                        if (messageElement) {
                                            messageElement.innerHTML = renderMarkdown('⚠️ 用户已确认,正在执行危险命令...');
                                        }
                                        
                                        const confirmResponse = await fetch('/confirm', {
                                            method: 'POST',
                                            headers: {
                                                'Content-Type': 'application/json'
                                            },
                                            body: JSON.stringify({
                                                command: data.command,
                                                user_message: content
                                            })
                                        });
                                        
                                        const confirmData = await confirmResponse.json();
                                        
                                        if (messageElement) {
                                            updateMessage(messageElement, confirmData.output || '执行完成');
                                        }
                                    } else {
                                        if (messageElement) {
                                            messageElement.innerHTML = renderMarkdown('❌ 用户取消执行危险命令');
                                        }
                                    }
                                    
                                } else if (data.type === 'done') {
                                    // 流结束
                                    if (messageElement && data.content) {
                                        updateMessage(messageElement, data.content);
                                    }
                                    
                                } else if (data.type === 'error') {
                                    // 错误处理
                                    typingIndicator.classList.remove('show');
                                    addMessage(data.content, 'assistant');
                                }
                                
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }

            } catch (error) {
                console.error('Error:', error);
                typingIndicator.classList.remove('show');
                addMessage('发生错误，请重试', 'assistant');
            }

            sendButton.disabled = false;
            messageInput.focus();
        }

        sendButton.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.focus();
    </script>
</body>
</html>
