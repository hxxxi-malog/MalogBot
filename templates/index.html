<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MalogBot</title>
    <!-- Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 代码高亮库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ==================== CSS变量系统 ==================== */
        :root {
            /* 品牌色 */
            --primary-50: #EEF2FF;
            --primary-100: #E0E7FF;
            --primary-200: #C7D2FE;
            --primary-500: #6366F1;
            --primary-600: #4F46E5;
            --primary-700: #4338CA;

            /* 中性色 */
            --gray-50: #FAFAFA;
            --gray-100: #F4F4F5;
            --gray-200: #E4E4E7;
            --gray-300: #D4D4D8;
            --gray-400: #A1A1AA;
            --gray-500: #71717A;
            --gray-600: #52525B;
            --gray-700: #3F3F46;
            --gray-800: #27272A;
            --gray-900: #18181B;

            /* 语义色 */
            --success-50: #F0FDF4;
            --success-500: #22C55E;
            --success-600: #16A34A;
            --warning-50: #FFFBEB;
            --warning-500: #F59E0B;
            --warning-600: #D97706;
            --danger-50: #FEF2F2;
            --danger-500: #EF4444;
            --danger-600: #DC2626;
            --danger-700: #B91C1C;

            /* 阴影 */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);

            /* 间距系统 */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 24px;
            --spacing-2xl: 32px;
            --spacing-3xl: 48px;

            /* 圆角 */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-2xl: 24px;
            --radius-full: 9999px;

            /* 过渡 */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==================== 全局重置 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-50);
            height: 100vh;
            display: flex;
            color: var(--gray-900);
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ==================== 侧边栏 ==================== */
        .sidebar-container {
            width: 280px;
            background: var(--gray-900);
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: var(--spacing-xl);
            border-bottom: 1px solid var(--gray-800);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            border: none;
            background: transparent;
            color: var(--gray-400);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-base);
            font-size: 18px;
        }

        .btn-icon:hover {
            background: var(--gray-800);
            color: white;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-md);
        }

        .session-item {
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--radius-md);
            cursor: pointer;
            margin-bottom: var(--spacing-xs);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all var(--transition-base);
            position: relative;
        }

        .session-item:hover {
            background: var(--gray-800);
        }

        .session-item.active {
            background: var(--primary-600);
        }

        .session-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background: white;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        .session-title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-meta {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 2px;
        }

        .session-item.active .session-meta {
            color: rgba(255, 255, 255, 0.7);
        }

        .session-actions {
            display: none;
            gap: var(--spacing-xs);
        }

        .session-item:hover .session-actions,
        .session-item.active:hover .session-actions {
            display: flex;
        }

        .btn-action {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--gray-500);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            font-size: 14px;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-action.danger:hover {
            background: var(--danger-600);
            color: white;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: var(--spacing-3xl) var(--spacing-xl);
            color: var(--gray-500);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-lg);
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 14px;
            line-height: 1.5;
        }

        /* ==================== 欢迎页 ==================== */
        .welcome-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            height: 100vh;
            padding: var(--spacing-3xl) var(--spacing-xl);
            animation: fadeIn var(--transition-slow);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-container.hidden {
            display: none;
        }

        .brand-header {
            text-align: center;
            margin-bottom: var(--spacing-3xl);
        }

        .brand-logo {
            font-size: 72px;
            margin-bottom: var(--spacing-lg);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .brand-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: var(--spacing-sm);
            letter-spacing: -0.05em;
        }

        .brand-subtitle {
            font-size: 16px;
            color: var(--gray-500);
            font-weight: 400;
        }

        .input-group-container {
            width: 100%;
            max-width: 640px;
            margin-bottom: var(--spacing-3xl);
        }

        .input-group {
            position: relative;
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            transition: all var(--transition-base);
            border: 2px solid var(--gray-200);
        }

        .input-group:focus-within {
            border-color: var(--primary-500);
            box-shadow: var(--shadow-xl), 0 0 0 4px var(--primary-50);
        }

        .welcome-input {
            width: 100%;
            padding: var(--spacing-xl) 64px var(--spacing-xl) var(--spacing-xl);
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
            font-family: inherit;
            color: var(--gray-900);
        }

        .welcome-input::placeholder {
            color: var(--gray-400);
        }

        .btn-send-primary {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            background: var(--primary-600);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-md);
        }

        .btn-send-primary:hover {
            background: var(--primary-700);
            transform: translateY(-50%) scale(1.05);
        }

        .btn-send-primary:active {
            transform: translateY(-50%) scale(0.95);
        }

        .btn-send-primary:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
            transform: translateY(-50%) scale(1);
        }

        .welcome-options {
            display: flex;
            justify-content: center;
            gap: var(--spacing-lg);
            margin-top: var(--spacing-lg);
        }

        .toggle-switch-wrapper {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: all var(--transition-base);
            user-select: none;
        }

        .toggle-switch-wrapper:hover {
            background: var(--gray-100);
        }

        .toggle-switch-wrapper.active {
            background: var(--primary-50);
            border-color: var(--primary-200);
        }

        .toggle-icon {
            font-size: 18px;
        }

        .toggle-label {
            font-size: 14px;
            color: var(--gray-700);
            font-weight: 500;
        }

        .toggle-switch-wrapper.active .toggle-label {
            color: var(--primary-700);
        }

        /* 开关按钮 */
        .toggle {
            position: relative;
            width: 40px;
            height: 22px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--gray-300);
            transition: var(--transition-base);
            border-radius: var(--radius-full);
        }

        .toggle-slider::before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: var(--transition-base);
            border-radius: 50%;
            box-shadow: var(--shadow-sm);
        }

        input:checked + .toggle-slider {
            background-color: var(--primary-600);
        }

        input:checked + .toggle-slider::before {
            transform: translateX(18px);
        }

        /* 历史对话 */
        .history-section {
            width: 100%;
            max-width: 640px;
            animation: slideUp var(--transition-slow);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .history-header {
            font-size: 13px;
            color: var(--gray-500);
            margin-bottom: var(--spacing-lg);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: var(--spacing-lg);
            background: white;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            border: 1px solid var(--gray-100);
            box-shadow: var(--shadow-sm);
        }

        .history-item:hover {
            background: var(--gray-50);
            border-color: var(--gray-200);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .history-icon {
            font-size: 20px;
            margin-right: var(--spacing-md);
            opacity: 0.7;
        }

        .history-content {
            flex: 1;
            min-width: 0;
        }

        .history-title {
            font-size: 14px;
            color: var(--gray-900);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-meta {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 2px;
        }

        .history-action {
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .history-item:hover .history-action {
            opacity: 1;
        }

        .no-history {
            text-align: center;
            color: var(--gray-400);
            padding: var(--spacing-xl);
            font-size: 14px;
        }

        /* ==================== 聊天界面 ==================== */
        .chat-interface {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: white;
        }

        .chat-interface.hidden {
            display: none;
        }

        .chat-header {
            padding: var(--spacing-xl) var(--spacing-2xl);
            background: linear-gradient(135deg, var(--primary-600) 0%, var(--primary-700) 100%);
            color: white;
            text-align: center;
            box-shadow: var(--shadow-md);
        }

        .chat-header-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .message-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-2xl);
            background: var(--gray-50);
        }

        .message {
            margin-bottom: var(--spacing-xl);
            display: flex;
            animation: messageSlideIn var(--transition-base);
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 65%;
            padding: var(--spacing-lg) var(--spacing-xl);
            border-radius: var(--radius-xl);
            word-wrap: break-word;
            line-height: 1.6;
        }

        .message.user .message-content {
            background: var(--primary-600);
            color: white;
            border-bottom-right-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
        }

        .message.assistant .message-content {
            background: white;
            color: var(--gray-800);
            border-bottom-left-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-100);
        }

        /* Markdown 渲染样式 */
        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4,
        .message-content h5,
        .message-content h6 {
            margin-top: 1.2em;
            margin-bottom: 0.6em;
            font-weight: 600;
            line-height: 1.3;
        }

        .message-content h1 { font-size: 1.5em; }
        .message-content h2 { font-size: 1.3em; }
        .message-content h3 { font-size: 1.15em; }

        .message-content p {
            margin: 0.8em 0;
            white-space: pre-wrap;
        }

        .message-content ul,
        .message-content ol {
            margin: 0.8em 0;
            padding-left: 1.5em;
        }

        .message-content li {
            margin: 0.4em 0;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.06);
            padding: 3px 6px;
            border-radius: var(--radius-sm);
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
        }

        .message.user .message-content code {
            background: rgba(255, 255, 255, 0.2);
        }

        .message-content pre {
            margin: 1em 0;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .message-content pre code {
            display: block;
            padding: var(--spacing-lg);
            background: var(--gray-900);
            color: #e4e4e7;
            overflow-x: auto;
            font-size: 0.85em;
            line-height: 1.6;
        }

        .message-content blockquote {
            margin: 1em 0;
            padding: var(--spacing-md) var(--spacing-lg);
            border-left: 4px solid var(--primary-500);
            background: var(--primary-50);
            color: var(--gray-700);
        }

        .message-content table {
            border-collapse: collapse;
            margin: 1em 0;
            width: 100%;
            font-size: 0.9em;
        }

        .message-content th,
        .message-content td {
            border: 1px solid var(--gray-200);
            padding: var(--spacing-md) var(--spacing-lg);
            text-align: left;
        }

        .message-content th {
            background: var(--gray-50);
            font-weight: 600;
        }

        .message-content a {
            color: var(--primary-600);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color var(--transition-fast);
        }

        .message-content a:hover {
            border-bottom-color: var(--primary-600);
        }

        .message-content hr {
            border: none;
            border-top: 1px solid var(--gray-200);
            margin: 1.5em 0;
        }

        /* 输入区域 */
        .input-area {
            padding: var(--spacing-xl) var(--spacing-2xl);
            background: white;
            border-top: 1px solid var(--gray-100);
            display: flex;
            gap: var(--spacing-md);
            align-items: center;
            flex-wrap: wrap;
        }

        .input-area-main {
            flex: 1;
            display: flex;
            gap: var(--spacing-md);
            min-width: 200px;
        }

        .chat-input {
            flex: 1;
            padding: var(--spacing-lg) var(--spacing-xl);
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-full);
            font-size: 15px;
            outline: none;
            transition: all var(--transition-base);
            font-family: inherit;
            background: var(--gray-50);
        }

        .chat-input:focus {
            border-color: var(--primary-500);
            background: white;
            box-shadow: 0 0 0 4px var(--primary-50);
        }

        .btn {
            padding: var(--spacing-lg) var(--spacing-2xl);
            border: none;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all var(--transition-base);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .btn-primary {
            background: var(--primary-600);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            background: var(--primary-700);
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: var(--danger-500);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-danger:hover {
            background: var(--danger-600);
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }

        /* 打字指示器 */
        .typing-indicator {
            display: none;
            padding: var(--spacing-lg) var(--spacing-xl);
            background: white;
            border-radius: var(--radius-xl);
            margin-bottom: var(--spacing-xl);
            width: fit-content;
            color: var(--gray-500);
            font-size: 14px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-100);
        }

        .typing-indicator.show {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--primary-500);
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* ==================== 命令确认卡片 ==================== */
        .confirm-card {
            margin-top: var(--spacing-lg);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            overflow: hidden;
            font-size: 13px;
            background: white;
            box-shadow: var(--shadow-md);
        }

        .confirm-card.danger {
            border-color: var(--danger-200);
            background: var(--danger-50);
        }

        .confirm-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
        }

        .confirm-card.danger .confirm-header {
            background: var(--danger-100);
            border-bottom-color: var(--danger-200);
        }

        .confirm-path {
            color: var(--gray-600);
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            font-size: 11px;
            font-weight: 500;
        }

        .confirm-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .confirm-btn {
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all var(--transition-fast);
        }

        .confirm-btn.cancel {
            background: white;
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
        }

        .confirm-btn.cancel:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
        }

        .confirm-btn.confirm {
            background: var(--primary-600);
            color: white;
        }

        .confirm-btn.confirm:hover {
            background: var(--primary-700);
        }

        .confirm-card.danger .confirm-btn.confirm {
            background: var(--danger-600);
        }

        .confirm-card.danger .confirm-btn.confirm:hover {
            background: var(--danger-700);
        }

        .confirm-body {
            padding: var(--spacing-lg);
        }

        .confirm-warning {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            color: var(--danger-700);
            font-size: 12px;
            margin-bottom: var(--spacing-md);
            font-weight: 500;
        }

        .confirm-command {
            background: var(--gray-900);
            color: #e4e4e7;
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }

        .confirm-card.executing {
            opacity: 0.6;
            pointer-events: none;
        }

        .confirm-card.confirmed .confirm-actions::before {
            content: '✅ 已执行';
            font-size: 12px;
            color: var(--success-600);
            font-weight: 500;
        }

        .confirm-card.cancelled .confirm-actions::before {
            content: '❌ 已取消';
            font-size: 12px;
            color: var(--danger-600);
            font-weight: 500;
        }

        .confirm-card.confirmed .confirm-btn,
        .confirm-card.cancelled .confirm-btn {
            display: none;
        }

        /* ==================== 递归限制卡片 ==================== */
        .recursion-card {
            margin-top: var(--spacing-lg);
            border: 2px solid var(--warning-500);
            border-radius: var(--radius-lg);
            overflow: hidden;
            font-size: 13px;
            background: var(--warning-50);
            box-shadow: var(--shadow-md);
        }

        .recursion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-lg);
            background: var(--warning-100);
            border-bottom: 2px solid var(--warning-500);
        }

        .recursion-warning {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            color: var(--gray-900);
            font-weight: 600;
        }

        .recursion-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .recursion-btn {
            padding: var(--spacing-md) var(--spacing-xl);
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all var(--transition-fast);
        }

        .recursion-btn.stop {
            background: white;
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
        }

        .recursion-btn.stop:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
        }

        .recursion-btn.continue {
            background: var(--warning-500);
            color: white;
        }

        .recursion-btn.continue:hover {
            background: var(--warning-600);
        }

        .recursion-body {
            padding: var(--spacing-lg);
        }

        .recursion-message {
            color: var(--gray-800);
            line-height: 1.6;
        }

        .recursion-partial {
            margin-top: var(--spacing-md);
            padding: var(--spacing-md);
            background: white;
            border-radius: var(--radius-md);
            font-size: 12px;
            color: var(--gray-600);
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid var(--gray-200);
        }

        .recursion-card.executing {
            opacity: 0.6;
            pointer-events: none;
        }

        .recursion-card.stopped .recursion-actions::before {
            content: '⏹️ 已停止';
            font-size: 13px;
            color: var(--danger-600);
            font-weight: 500;
        }

        .recursion-card.continued .recursion-actions::before {
            content: '▶️ 继续执行中...';
            font-size: 13px;
            color: var(--success-600);
            font-weight: 500;
        }

        .recursion-card.stopped .recursion-btn,
        .recursion-card.continued .recursion-btn {
            display: none;
        }

        /* ==================== 响应式设计 ==================== */
        @media (max-width: 768px) {
            .sidebar-container {
                position: fixed;
                left: -280px;
                z-index: 1000;
                transition: left var(--transition-slow);
                box-shadow: var(--shadow-xl);
            }

            .sidebar-container.open {
                left: 0;
            }

            .welcome-container {
                padding: var(--spacing-xl);
            }

            .brand-title {
                font-size: 24px;
            }

            .brand-logo {
                font-size: 56px;
            }

            .message-content {
                max-width: 85%;
            }

            .input-area {
                padding: var(--spacing-lg);
            }
        }

        @media (max-width: 640px) {
            .message-content {
                max-width: 90%;
            }

            .btn {
                padding: var(--spacing-md) var(--spacing-lg);
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar-container" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">💬 对话列表</span>
            <button class="btn-icon" id="newChatBtnSidebar" title="新建对话">
                <span>➕</span>
            </button>
        </div>
        <div class="session-list" id="sessionList">
            <!-- 会话列表将通过JS动态生成 -->
        </div>
    </div>

    <!-- 欢迎页 -->
    <div class="welcome-container" id="welcomePage">
        <div class="brand-header">
            <div class="brand-logo">🤖</div>
            <h1 class="brand-title">MalogBot</h1>
            <p class="brand-subtitle">您的智能助手，随时准备为您解答问题</p>
        </div>

        <div class="input-group-container">
            <div class="input-group">
                <input
                    type="text"
                    class="welcome-input"
                    id="welcomeInput"
                    placeholder="输入您的问题，开始新对话..."
                    autocomplete="off"
                >
                <button class="btn-send-primary" id="welcomeSendBtn">➤</button>
            </div>
            <div class="welcome-options">
                <div class="toggle-switch-wrapper" id="welcomeWebSearchToggle">
                    <span class="toggle-icon">🌐</span>
                    <span class="toggle-label">联网搜索</span>
                    <label class="toggle">
                        <input type="checkbox" id="welcomeWebSearchCheckbox">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <div class="history-section" id="historySection">
            <div class="history-header">
                <span>📜</span>
                <span>历史对话</span>
            </div>
            <div class="history-list" id="historyList">
                <!-- 历史对话列表将通过JS动态生成 -->
            </div>
        </div>
    </div>

    <!-- 聊天界面 -->
    <div class="chat-interface hidden" id="chatInterface">
        <div class="chat-header">
            <h1 class="chat-header-title">🤖 MalogBot</h1>
        </div>

        <div class="message-list" id="chatMessages">
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <span>AI 正在思考...</span>
            </div>
        </div>

        <div class="input-area">
            <div class="toggle-switch-wrapper" id="chatWebSearchToggle">
                <span class="toggle-icon">🌐</span>
                <span class="toggle-label">联网搜索</span>
                <label class="toggle">
                    <input type="checkbox" id="chatWebSearchCheckbox">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="input-area-main">
                <input
                    type="text"
                    class="chat-input"
                    id="messageInput"
                    placeholder="输入消息..."
                    autocomplete="off"
                >
                <button class="btn btn-primary" id="sendButton">发送</button>
                <button class="btn btn-danger" id="stopButton">停止</button>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素
        const welcomePage = document.getElementById('welcomePage');
        const chatInterface = document.getElementById('chatInterface');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const stopButton = document.getElementById('stopButton');
        const typingIndicator = document.getElementById('typingIndicator');
        const sidebar = document.getElementById('sidebar');
        const sessionList = document.getElementById('sessionList');
        const newChatBtnSidebar = document.getElementById('newChatBtnSidebar');
        const welcomeInput = document.getElementById('welcomeInput');
        const welcomeSendBtn = document.getElementById('welcomeSendBtn');
        const historyList = document.getElementById('historyList');

        // 联网搜索开关元素
        const welcomeWebSearchToggle = document.getElementById('welcomeWebSearchToggle');
        const welcomeWebSearchCheckbox = document.getElementById('welcomeWebSearchCheckbox');
        const chatWebSearchToggle = document.getElementById('chatWebSearchToggle');
        const chatWebSearchCheckbox = document.getElementById('chatWebSearchCheckbox');

        // 保存当前对话的原始用户消息，用于多步骤确认
        let currentOriginalUserMessage = '';

        // 用于取消请求的 AbortController
        let currentAbortController = null;

        // 当前会话ID
        let currentSessionId = null;

        // 是否处于欢迎页
        let isWelcomeMode = true;

        // 会话列表缓存
        let sessionsCache = [];

        // 联网搜索状态
        let webSearchEnabled = false;

        // 更新联网搜索开关的显示状态
        function updateWebSearchToggleUI() {
            if (welcomeWebSearchToggle && welcomeWebSearchCheckbox) {
                welcomeWebSearchCheckbox.checked = webSearchEnabled;
                welcomeWebSearchToggle.classList.toggle('active', webSearchEnabled);
            }
            if (chatWebSearchToggle && chatWebSearchCheckbox) {
                chatWebSearchCheckbox.checked = webSearchEnabled;
                chatWebSearchToggle.classList.toggle('active', webSearchEnabled);
            }
        }

        // 配置 marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (e) {}
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            return marked.parse(text);
        }

        function addMessage(content, role, isMarkdown = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (isMarkdown && role === 'assistant') {
                contentDiv.innerHTML = renderMarkdown(content);
                contentDiv.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            } else {
                contentDiv.textContent = content;
            }

            messageDiv.appendChild(contentDiv);
            chatMessages.insertBefore(messageDiv, typingIndicator);

            chatMessages.scrollTop = chatMessages.scrollHeight;

            return contentDiv;
        }

        function updateMessage(element, content) {
            element.innerHTML = renderMarkdown(content);
            element.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 显示停止按钮，隐藏发送按钮
        function showStopButton() {
            sendButton.style.display = 'none';
            stopButton.style.display = 'inline-flex';
        }

        // 隐藏停止按钮,显示发送按钮
        function hideStopButton() {
            sendButton.style.display = 'inline-flex';
            stopButton.style.display = 'none';
        }

        // 显示欢迎页
        function showWelcomePage() {
            isWelcomeMode = true;
            welcomePage.classList.remove('hidden');
            chatInterface.classList.add('hidden');
            currentSessionId = null;
            renderSessionList(); // 更新侧边栏高亮
            renderHistoryList(); // 更新欢迎页历史列表
            welcomeInput.focus();
        }

        // 显示聊天界面
        function showChatInterface() {
            isWelcomeMode = false;
            welcomePage.classList.add('hidden');
            chatInterface.classList.remove('hidden');
            messageInput.focus();
            // 切换到聊天界面后重新渲染会话列表，确保高亮正确
            renderSessionList();
        }

        // 停止生成
        async function stopGeneration() {
            if (currentAbortController) {
                // 调用后端取消接口
                try {
                    await fetch('/stop', { method: 'POST' });
                } catch (e) {
                    console.error('Stop request error:', e);
                }
                // 取消前端请求
                currentAbortController.abort();
                currentAbortController = null;
            }

            hideStopButton();
            sendButton.disabled = false;
            typingIndicator.classList.remove('show');
            messageInput.focus();
        }

        // 流式读取并处理响应的通用函数
        async function streamReader(reader, messageElement, onDone, handleRecursionLimit = false) {
            const decoder = new TextDecoder();
            let assistantMessage = '';

            try {
                while (true) {
                    // 检查是否被取消
                    if (!currentAbortController) {
                        break;
                    }

                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));

                                if (data.type === 'content') {
                                    assistantMessage = data.accumulated;
                                    updateMessage(messageElement, assistantMessage);
                                } else if (data.type === 'tool_result') {
                                    updateMessage(messageElement, data.content);
                                } else if (data.type === 'cancelled') {
                                    // 用户取消了输出
                                    if (data.content) {
                                        updateMessage(messageElement, data.content);
                                    }
                                    // 在消息末尾添加取消标记
                                    const cancelDiv = document.createElement('div');
                                    cancelDiv.style.cssText = 'margin-top: 8px; padding: 8px 12px; background: var(--warning-50); border-radius: var(--radius-md); font-size: 12px; color: var(--warning-700); display: inline-block;';
                                    cancelDiv.textContent = '⏹️ 输出已停止';
                                    messageElement.appendChild(cancelDiv);
                                    return;
                                } else if (data.type === 'confirmation_required' || data.type === 'dangerous_command') {
                                    // 需要用户确认命令
                                    // 使用保存的原始用户消息，而不是助手响应
                                    appendConfirmCard(messageElement, data, currentOriginalUserMessage);
                                    hideStopButton();
                                    sendButton.disabled = false;
                                    return;
                                } else if (data.type === 'recursion_limit_reached') {
                                    // 达到递归限制
                                    if (assistantMessage) {
                                        updateMessage(messageElement, assistantMessage);
                                    }
                                    appendRecursionLimitCard(messageElement, data);
                                    hideStopButton();
                                    sendButton.disabled = false;
                                    return;
                                } else if (data.type === 'done') {
                                    if (data.content && !assistantMessage) {
                                        updateMessage(messageElement, data.content);
                                    }
                                } else if (data.type === 'error') {
                                    updateMessage(messageElement, '❌ 错误: ' + data.content);
                                }
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Request aborted by user');
                } else {
                    console.error('Stream error:', error);
                }
            }

            if (onDone) onDone();
        }

        function createConfirmCard(commandData, userMessage) {
            const card = document.createElement('div');
            card.className = 'confirm-card' + (commandData.is_dangerous ? ' danger' : '');
            card.dataset.command = commandData.command;
            card.dataset.userMessage = userMessage;

            // 构建卡片内容
            let cardHtml = `
                <div class="confirm-header">
                    <span class="confirm-path">📁 ${escapeHtml(commandData.working_dir || '-')}</span>
                    <div class="confirm-actions">
                        <button class="confirm-btn cancel">取消</button>
                        <button class="confirm-btn confirm">执行</button>
                    </div>
                </div>
                <div class="confirm-body">
            `;

            if (commandData.is_dangerous && commandData.reason) {
                cardHtml += `
                    <div class="confirm-warning">
                        <span>⚠️</span>
                        <span>${escapeHtml(commandData.reason)}</span>
                    </div>
                `;
            }

            cardHtml += `
                    <div class="confirm-command">${escapeHtml(commandData.command)}</div>
                </div>
            `;

            card.innerHTML = cardHtml;

            // 绑定按钮事件
            const cancelBtn = card.querySelector('.confirm-btn.cancel');
            const confirmBtn = card.querySelector('.confirm-btn.confirm');

            cancelBtn.addEventListener('click', () => handleCancel(card));
            confirmBtn.addEventListener('click', () => handleConfirm(card));

            return card;
        }

        function appendConfirmCard(messageElement, commandData, userMessage) {
            // 移除已有的确认卡片
            const existingCard = messageElement.querySelector('.confirm-card:not(.confirmed):not(.cancelled)');
            if (existingCard) {
                existingCard.remove();
            }

            // 创建并追加新的确认卡片
            const card = createConfirmCard(commandData, userMessage);
            messageElement.appendChild(card);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function handleConfirm(card) {
            const command = card.dataset.command;
            const userMessage = card.dataset.userMessage;

            // 更新卡片状态为执行中
            card.classList.add('executing');
            card.querySelector('.confirm-btn.confirm').textContent = '执行中...';

            // 标记卡片为已执行（这样状态就固定了）
            card.classList.remove('executing');
            card.classList.add('confirmed');

            // 创建新的消息用于显示后续输出
            const newMessageElement = addMessage('', 'assistant');

            // 创建新的 AbortController 并显示停止按钮
            currentAbortController = new AbortController();
            showStopButton();

            try {
                const confirmResponse = await fetch('/confirm/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        command: command,
                        user_message: userMessage
                    }),
                    signal: currentAbortController.signal
                });

                const reader = confirmResponse.body.getReader();

                await streamReader(reader, newMessageElement, () => {
                    hideStopButton();
                    sendButton.disabled = false;
                    currentAbortController = null;
                    messageInput.focus();
                    loadSessions(); // 刷新会话列表
                });
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Confirm request aborted by user');
                } else {
                    console.error('Confirm error:', error);
                    updateMessage(newMessageElement, '❌ 执行命令失败: ' + error.message);
                }
                hideStopButton();
                sendButton.disabled = false;
                currentAbortController = null;
                messageInput.focus();
            }
        }

        async function handleCancel(card) {
            const command = card.dataset.command;
            const userMessage = card.dataset.userMessage;

            // 标记卡片为已取消（状态固定）
            card.classList.add('cancelled');
            card.classList.remove('danger');

            // 创建新的消息用于显示后续输出
            const newMessageElement = addMessage('', 'assistant');

            // 创建新的 AbortController 并显示停止按钮
            currentAbortController = new AbortController();
            showStopButton();

            try {
                const cancelResponse = await fetch('/cancel', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        command: command,
                        user_message: userMessage
                    }),
                    signal: currentAbortController.signal
                });

                const reader = cancelResponse.body.getReader();

                await streamReader(reader, newMessageElement, () => {
                    hideStopButton();
                    sendButton.disabled = false;
                    currentAbortController = null;
                    messageInput.focus();
                    loadSessions(); // 刷新会话列表
                });
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Cancel request aborted by user');
                } else {
                    console.error('Cancel error:', error);
                    updateMessage(newMessageElement, '用户已取消命令执行。');
                }
                hideStopButton();
                sendButton.disabled = false;
                currentAbortController = null;
                messageInput.focus();
            }
        }

        // ==================== 递归限制处理 ====================

        function createRecursionLimitCard(data) {
            const card = document.createElement('div');
            card.className = 'recursion-card';

            let partialOutputHtml = '';
            if (data.partial_output) {
                partialOutputHtml = `<div class="recursion-partial">${escapeHtml(data.partial_output.substring(0, 500))}${data.partial_output.length > 500 ? '...' : ''}</div>`;
            }

            card.innerHTML = `
                <div class="recursion-header">
                    <div class="recursion-warning">
                        <span>⚠️</span>
                        <span>执行步数限制</span>
                    </div>
                    <div class="recursion-actions">
                        <button class="recursion-btn stop">停止</button>
                        <button class="recursion-btn continue">继续执行</button>
                    </div>
                </div>
                <div class="recursion-body">
                    <div class="recursion-message">
                        ${escapeHtml(data.message || '已达到最大执行步数限制。任务可能还未完成，是否继续执行？')}
                    </div>
                    ${partialOutputHtml}
                </div>
            `;

            const stopBtn = card.querySelector('.recursion-btn.stop');
            const continueBtn = card.querySelector('.recursion-btn.continue');

            stopBtn.addEventListener('click', () => handleRecursionStop(card));
            continueBtn.addEventListener('click', () => handleRecursionContinue(card));

            return card;
        }

        function appendRecursionLimitCard(messageElement, data) {
            // 移除已有的递归限制卡片
            const existingCard = messageElement.querySelector('.recursion-card:not(.stopped):not(.continued)');
            if (existingCard) {
                existingCard.remove();
            }

            const card = createRecursionLimitCard(data);
            messageElement.appendChild(card);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function handleRecursionStop(card) {
            // 标记为已停止
            card.classList.add('stopped');

            // 添加提示信息
            const infoDiv = document.createElement('div');
            infoDiv.style.cssText = 'margin-top: 12px; padding: 12px; background: var(--danger-50); border-radius: var(--radius-md); font-size: 13px; color: var(--danger-700);';
            infoDiv.textContent = '⏹️ 任务执行已停止。如需继续，请发送新的消息。';
            card.appendChild(infoDiv);

            sendButton.disabled = false;
            messageInput.focus();
        }

        async function handleRecursionContinue(card) {
            // 更新卡片状态
            card.classList.add('executing');
            card.querySelector('.recursion-btn.continue').textContent = '继续中...';

            // 创建新的消息用于显示后续输出
            const newMessageElement = addMessage('', 'assistant');

            // 创建新的 AbortController 并显示停止按钮
            currentAbortController = new AbortController();
            showStopButton();

            try {
                const response = await fetch('/continue/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    signal: currentAbortController.signal
                });

                const reader = response.body.getReader();

                // 标记卡片为已继续
                card.classList.remove('executing');
                card.classList.add('continued');

                await streamReader(reader, newMessageElement, () => {
                    hideStopButton();
                    sendButton.disabled = false;
                    currentAbortController = null;
                    messageInput.focus();
                    loadSessions(); // 刷新会话列表
                }, true); // 传入 true 表示需要处理递归限制

            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Continue request aborted by user');
                } else {
                    console.error('Continue error:', error);
                    updateMessage(newMessageElement, '❌ 继续执行失败: ' + error.message);
                }
                hideStopButton();
                sendButton.disabled = false;
                currentAbortController = null;
                messageInput.focus();
            }
        }

        // 发送消息的核心函数
        async function sendMessageWithInput(content, isNewSession = false) {
            if (!content) return;

            // 保存原始用户消息，用于后续确认
            currentOriginalUserMessage = content;

            // 如果是新会话，先创建会话
            if (isNewSession || !currentSessionId) {
                await createNewSession(false);
            }

            // 显示聊天界面
            showChatInterface();

            // 添加用户消息
            addMessage(content, 'user', false);

            messageInput.value = '';
            sendButton.disabled = true;
            typingIndicator.classList.add('show');

            // 创建新的 AbortController
            currentAbortController = new AbortController();

            // 显示停止按钮
            showStopButton();

            try {
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: content }),
                    signal: currentAbortController.signal
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                let assistantMessage = '';
                let messageElement = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));

                                if (data.type === 'content') {
                                    typingIndicator.classList.remove('show');

                                    assistantMessage = data.accumulated;

                                    if (!messageElement) {
                                        messageElement = addMessage('', 'assistant');
                                    }

                                    updateMessage(messageElement, assistantMessage);

                                } else if (data.type === 'cancelled') {
                                    // 用户取消了输出
                                    typingIndicator.classList.remove('show');
                                    if (data.content && !messageElement) {
                                        messageElement = addMessage('', 'assistant');
                                        updateMessage(messageElement, data.content);
                                    }
                                    if (messageElement) {
                                        // 在消息末尾添加取消标记
                                        const cancelDiv = document.createElement('div');
                                        cancelDiv.style.cssText = 'margin-top: 8px; padding: 8px 12px; background: var(--warning-50); border-radius: var(--radius-md); font-size: 12px; color: var(--warning-700); display: inline-block;';
                                        cancelDiv.textContent = '⏹️ 输出已停止';
                                        messageElement.appendChild(cancelDiv);
                                    }
                                    return;

                                } else if (data.type === 'confirmation_required' || data.type === 'dangerous_command') {
                                    typingIndicator.classList.remove('show');

                                    if (!messageElement) {
                                        messageElement = addMessage('', 'assistant');
                                    }

                                    // 追加内联确认卡片
                                    appendConfirmCard(messageElement, data, content);
                                    hideStopButton();
                                    sendButton.disabled = false;
                                    return;

                                } else if (data.type === 'recursion_limit_reached') {
                                    // 达到递归限制
                                    typingIndicator.classList.remove('show');

                                    if (!messageElement) {
                                        messageElement = addMessage('', 'assistant');
                                    }

                                    // 追加递归限制确认卡片
                                    appendRecursionLimitCard(messageElement, data);
                                    hideStopButton();
                                    sendButton.disabled = false;
                                    return;

                                } else if (data.type === 'done') {
                                    if (messageElement && data.content) {
                                        updateMessage(messageElement, data.content);
                                    }

                                } else if (data.type === 'error') {
                                    typingIndicator.classList.remove('show');
                                    addMessage(data.content, 'assistant');
                                }

                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }

                // 发送完成后刷新会话列表
                loadSessions();

            } catch (error) {
                if (error.name === 'AbortError') {
                    // 用户主动取消，不显示错误
                    console.log('Request aborted by user');
                } else {
                    console.error('Error:', error);
                    typingIndicator.classList.remove('show');
                    addMessage('发生错误，请重试', 'assistant');
                }
            }

            hideStopButton();
            sendButton.disabled = false;
            currentAbortController = null;
            messageInput.focus();
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            await sendMessageWithInput(content, false);
        }

        // ==================== 会话管理 ====================

        // 加载会话列表
        async function loadSessions() {
            try {
                const response = await fetch('/sessions');
                const data = await response.json();

                sessionsCache = data.sessions || [];
                // 后端返回的 current_session_id
                const backendSessionId = data.current_session_id;

                // 在非欢迎页模式下，如果后端返回了有效的 session_id，使用它
                if (!isWelcomeMode && backendSessionId) {
                    currentSessionId = backendSessionId;
                }

                // 在欢迎页模式下，检查是否需要自动切换到已有会话
                if (isWelcomeMode && backendSessionId) {
                    const currentSession = sessionsCache.find(s => s.session_id === backendSessionId);
                    if (currentSession && currentSession.message_count > 0) {
                        // 有消息的会话，显示聊天界面
                        currentSessionId = backendSessionId;
                        await loadSessionHistory(backendSessionId);
                        showChatInterface();
                    }
                }

                renderSessionList();
                renderHistoryList();
            } catch (error) {
                console.error('Load sessions error:', error);
            }
        }

        // 渲染侧边栏会话列表
        function renderSessionList() {
            sessionList.innerHTML = '';

            if (sessionsCache.length === 0) {
                sessionList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div class="empty-state-text">暂无对话记录<br>点击"+"开始聊天</div>
                    </div>
                `;
                return;
            }

            sessionsCache.forEach(session => {
                const item = document.createElement('div');
                item.className = 'session-item' + (session.session_id === currentSessionId && !isWelcomeMode ? ' active' : '');
                item.dataset.sessionId = session.session_id;

                // 格式化时间
                const updatedAt = new Date(session.updated_at);
                const timeStr = formatTime(updatedAt);

                // 获取会话标题（使用第一条用户消息或默认标题）
                const title = `对话 ${session.session_id.substring(0, 8)}`;

                item.innerHTML = `
                    <div class="session-info">
                        <div class="session-title">${escapeHtml(title)}</div>
                        <div class="session-meta">${timeStr} · ${session.message_count} 条消息</div>
                    </div>
                    <div class="session-actions">
                        <button class="btn-action danger" title="删除对话">🗑️</button>
                    </div>
                `;

                // 点击切换会话
                item.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('btn-action')) {
                        switchToSession(session.session_id);
                    }
                });

                // 删除按钮
                const deleteBtn = item.querySelector('.btn-action.danger');
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSession(session.session_id);
                });

                sessionList.appendChild(item);
            });
        }

        // 渲染欢迎页历史列表
        function renderHistoryList() {
            // 过滤出有消息的会话,并按更新时间倒序排序
            const sessionsWithMessages = sessionsCache
                .filter(s => s.message_count > 0)
                .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))
                .slice(0, 3); // 只取最近3条

            historyList.innerHTML = '';

            if (sessionsWithMessages.length === 0) {
                historyList.innerHTML = '<div class="no-history">暂无历史对话</div>';
                return;
            }

            sessionsWithMessages.forEach(session => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.dataset.sessionId = session.session_id;

                // 格式化时间
                const updatedAt = new Date(session.updated_at);
                const timeStr = formatTime(updatedAt);

                // 获取会话标题
                const title = `对话 ${session.session_id.substring(0, 8)}`;

                item.innerHTML = `
                    <span class="history-icon">💬</span>
                    <div class="history-content">
                        <div class="history-title">${escapeHtml(title)}</div>
                        <div class="history-meta">${timeStr} · ${session.message_count} 条消息</div>
                    </div>
                    <div class="history-action">
                        <button class="btn-action danger" title="删除">🗑️</button>
                    </div>
                `;

                // 点击进入会话
                item.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('btn-action')) {
                        switchToSession(session.session_id);
                    }
                });

                // 删除按钮
                const deleteBtn = item.querySelector('.btn-action.danger');
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSession(session.session_id);
                });

                historyList.appendChild(item);
            });
        }

        // 格式化时间
        function formatTime(date) {
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';

            return date.toLocaleDateString('zh-CN');
        }

        // 创建新会话
        async function createNewSession(switchToChat = true) {
            try {
                const response = await fetch('/sessions/new', { method: 'POST' });
                const data = await response.json();

                if (data.session_id) {
                    currentSessionId = data.session_id;
                    clearChatMessages();

                    // 同步联网搜索状态到新会话
                    if (webSearchEnabled) {
                        await toggleWebSearch(true);
                    }

                    if (switchToChat) {
                        showChatInterface();
                    }

                    await loadSessions();
                }
            } catch (error) {
                console.error('Create session error:', error);
            }
        }

        // 删除会话
        async function deleteSession(sessionId) {
            if (!confirm('确定要删除这个对话吗？')) {
                return;
            }

            try {
                const response = await fetch(`/sessions/${sessionId}`, { method: 'DELETE' });
                const data = await response.json();

                if (data.status === 'ok') {
                    // 如果删除的是当前会话，返回欢迎页
                    if (sessionId === currentSessionId) {
                        showWelcomePage();
                    }
                    await loadSessions();
                } else {
                    alert(data.error || '删除失败');
                }
            } catch (error) {
                console.error('Delete session error:', error);
            }
        }

        // 切换会话
        async function switchToSession(sessionId) {
            if (sessionId === currentSessionId && !isWelcomeMode) {
                return;
            }

            try {
                const response = await fetch(`/sessions/${sessionId}/switch`, { method: 'POST' });
                const data = await response.json();

                if (data.status === 'ok') {
                    currentSessionId = sessionId;
                    clearChatMessages();
                    await loadSessionHistory(sessionId);
                    showChatInterface();
                    await loadSessions();

                    // 加载该会话的联网搜索状态
                    await loadWebSearchStatus();
                }
            } catch (error) {
                console.error('Switch session error:', error);
            }
        }

        // 加载会话历史消息
        async function loadSessionHistory(sessionId) {
            try {
                const response = await fetch(`/sessions/${sessionId}/info`);
                const data = await response.json();

                if (data.messages) {
                    clearChatMessages();
                    data.messages.forEach(msg => {
                        addMessage(msg.content, msg.role);
                    });
                }
            } catch (error) {
                console.error('Load session history error:', error);
            }
        }

        // 清空聊天消息
        function clearChatMessages() {
            const messages = chatMessages.querySelectorAll('.message');
            messages.forEach(msg => msg.remove());
        }

        // ==================== 事件绑定 ====================

        // 欢迎页输入框发送
        welcomeSendBtn.addEventListener('click', () => {
            const content = welcomeInput.value.trim();
            if (content) {
                sendMessageWithInput(content, true);
                welcomeInput.value = '';
            }
        });

        welcomeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const content = welcomeInput.value.trim();
                if (content) {
                    sendMessageWithInput(content, true);
                    welcomeInput.value = '';
                }
            }
        });

        // 侧边栏新建按钮
        newChatBtnSidebar.addEventListener('click', () => {
            showWelcomePage();
            welcomeInput.focus();
        });

        // 聊天界面发送
        sendButton.addEventListener('click', sendMessage);
        stopButton.addEventListener('click', stopGeneration);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ==================== 联网搜索功能 ====================

        // 加载联网搜索状态
        async function loadWebSearchStatus() {
            try {
                // 如果有当前会话，从服务器加载状态
                if (currentSessionId) {
                    const response = await fetch('/web-search/status');
                    const data = await response.json();
                    webSearchEnabled = data.enabled || false;
                }
                // 更新 UI
                updateWebSearchToggleUI();
            } catch (error) {
                console.error('Failed to load web search status:', error);
            }
        }

        // 切换联网搜索
        async function toggleWebSearch(enabled) {
            webSearchEnabled = enabled;
            updateWebSearchToggleUI();

            // 如果有当前会话，同步到服务器
            if (currentSessionId) {
                try {
                    const response = await fetch('/web-search/toggle', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ enabled: enabled })
                    });
                    const data = await response.json();
                    if (data.error) {
                        console.error('Failed to toggle web search:', data.error);
                        webSearchEnabled = !enabled;
                        updateWebSearchToggleUI();
                    } else {
                        console.log('Web search toggled:', enabled);
                    }
                } catch (error) {
                    console.error('Failed to toggle web search:', error);
                    webSearchEnabled = !enabled;
                    updateWebSearchToggleUI();
                }
            }
        }

        // 监听欢迎页联网搜索开关
        if (welcomeWebSearchCheckbox) {
            welcomeWebSearchCheckbox.addEventListener('change', (e) => {
                toggleWebSearch(e.target.checked);
            });
        }

        // 监听聊天界面联网搜索开关
        if (chatWebSearchCheckbox) {
            chatWebSearchCheckbox.addEventListener('change', (e) => {
                toggleWebSearch(e.target.checked);
            });
        }

        // 初始化
        loadSessions();
        updateWebSearchToggleUI();
    </script>
</body>
</html>
