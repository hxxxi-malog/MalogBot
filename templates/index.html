<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
        }

        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .chat-header {
            padding: 20px;
            background: #4a90d9;
            color: white;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: #4a90d9;
            color: white;
        }

        .message.assistant .message-content {
            background: #e9ecef;
            color: #333;
        }

        .chat-input-container {
            padding: 20px;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }

        .chat-input:focus {
            border-color: #4a90d9;
        }

        .send-button {
            padding: 12px 24px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
        }

        .send-button:hover {
            background: #3a7bc8;
        }

        .send-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: #e9ecef;
            border-radius: 16px;
            margin-bottom: 16px;
            width: fit-content;
        }

        .typing-indicator.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Chat Bot</h1>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="typing-indicator" id="typingIndicator">AI 正在输入...</div>
        </div>
        
        <div class="chat-input-container">
            <input 
                type="text" 
                class="chat-input" 
                id="messageInput" 
                placeholder="输入消息..."
                autocomplete="off"
            >
            <button class="send-button" id="sendButton">发送</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');

        function addMessage(content, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(contentDiv);
            chatMessages.insertBefore(messageDiv, typingIndicator);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            // 添加用户消息
            addMessage(content, 'user');
            
            messageInput.value = '';
            sendButton.disabled = true;
            typingIndicator.classList.add('show');

            try {
                // 使用流式接口
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: content })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                let assistantMessage = '';
                let messageElement = null;

                // 读取流式数据
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                
                                if (data.type === 'content') {
                                    // 流式内容
                                    typingIndicator.classList.remove('show');
                                    
                                    assistantMessage = data.accumulated;
                                    
                                    if (!messageElement) {
                                        const messageDiv = document.createElement('div');
                                        messageDiv.className = 'message assistant';
                                        messageElement = document.createElement('div');
                                        messageElement.className = 'message-content';
                                        messageDiv.appendChild(messageElement);
                                        chatMessages.insertBefore(messageDiv, typingIndicator);
                                    }
                                    
                                    messageElement.textContent = assistantMessage;
                                    chatMessages.scrollTop = chatMessages.scrollHeight;
                                    
                                } else if (data.type === 'dangerous_command') {
                                    // 危险命令,显示确认对话框
                                    typingIndicator.classList.remove('show');
                                    
                                    const confirmed = confirm(
                                        `${data.message}\n\n命令: ${data.command}\n\n是否执行?`
                                    );
                                    
                                    if (confirmed) {
                                        // 用户确认,执行命令
                                        if (messageElement) {
                                            messageElement.textContent = '⚠️ 用户已确认,正在执行危险命令...';
                                        }
                                        
                                        const confirmResponse = await fetch('/confirm', {
                                            method: 'POST',
                                            headers: {
                                                'Content-Type': 'application/json'
                                            },
                                            body: JSON.stringify({
                                                command: data.command,
                                                user_message: content
                                            })
                                        });
                                        
                                        const confirmData = await confirmResponse.json();
                                        
                                        if (messageElement) {
                                            messageElement.textContent = confirmData.output || '执行完成';
                                        }
                                    } else {
                                        if (messageElement) {
                                            messageElement.textContent = '❌ 用户取消执行危险命令';
                                        }
                                    }
                                    
                                } else if (data.type === 'done') {
                                    // 流结束
                                    if (messageElement && data.content) {
                                        messageElement.textContent = data.content;
                                    }
                                    
                                } else if (data.type === 'error') {
                                    // 错误处理
                                    typingIndicator.classList.remove('show');
                                    addMessage(data.content, 'assistant');
                                }
                                
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }

            } catch (error) {
                console.error('Error:', error);
                typingIndicator.classList.remove('show');
                addMessage('发生错误，请重试', 'assistant');
            }

            sendButton.disabled = false;
            messageInput.focus();
        }

        sendButton.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.focus();
    </script>
</body>
</html>
