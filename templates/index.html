<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bot</title>
    <!-- Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 代码高亮库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
        }

        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .chat-header {
            padding: 20px;
            background: #4a90d9;
            color: white;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #4a90d9;
            color: white;
        }

        .message.assistant .message-content {
            background: #e9ecef;
            color: #333;
        }

        /* Markdown 渲染样式 */
        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4,
        .message-content h5,
        .message-content h6 {
            margin-top: 1em;
            margin-bottom: 0.5em;
            font-weight: bold;
        }

        .message-content h1 { font-size: 1.5em; }
        .message-content h2 { font-size: 1.3em; }
        .message-content h3 { font-size: 1.1em; }

        .message-content p {
            margin: 0.5em 0;
            white-space: pre-wrap;
        }

        .message-content ul,
        .message-content ol {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }

        .message-content li {
            margin: 0.25em 0;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
        }

        .message-content pre {
            margin: 0.5em 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .message-content pre code {
            display: block;
            padding: 12px;
            background: #1e1e1e;
            color: #d4d4d4;
            overflow-x: auto;
            font-size: 0.85em;
            line-height: 1.5;
        }

        .message-content blockquote {
            margin: 0.5em 0;
            padding: 0.5em 1em;
            border-left: 3px solid #4a90d9;
            background: rgba(74, 144, 217, 0.1);
        }

        .message-content table {
            border-collapse: collapse;
            margin: 0.5em 0;
            width: 100%;
        }

        .message-content th,
        .message-content td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        .message-content th {
            background: #f5f5f5;
        }

        .message-content a {
            color: #4a90d9;
            text-decoration: none;
        }

        .message-content a:hover {
            text-decoration: underline;
        }

        .message-content hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 1em 0;
        }

        /* 用户消息中的代码块样式 */
        .message.user .message-content code {
            background: rgba(255, 255, 255, 0.2);
        }

        .message.user .message-content pre code {
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-input-container {
            padding: 20px;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }

        .chat-input:focus {
            border-color: #4a90d9;
        }

        .send-button {
            padding: 12px 24px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
        }

        .send-button:hover {
            background: #3a7bc8;
        }

        .send-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: #e9ecef;
            border-radius: 16px;
            margin-bottom: 16px;
            width: fit-content;
        }

        .typing-indicator.show {
            display: block;
        }

        /* 命令确认对话框样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-dialog {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow: hidden;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-header.danger {
            background: #fff5f5;
        }

        .modal-header.warning {
            background: #fffbeb;
        }

        .modal-icon {
            font-size: 24px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .modal-body {
            padding: 20px;
        }

        .command-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .command-info-row {
            display: flex;
            margin-bottom: 12px;
        }

        .command-info-row:last-child {
            margin-bottom: 0;
        }

        .command-info-label {
            font-weight: 600;
            color: #666;
            min-width: 80px;
        }

        .command-info-value {
            color: #333;
            flex: 1;
        }

        .command-box {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            overflow-x: auto;
            margin-top: 8px;
        }

        .danger-warning {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px;
            color: #dc2626;
            margin-bottom: 16px;
        }

        .danger-warning-icon {
            margin-right: 8px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #e9ecef;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-cancel {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-cancel:hover {
            background: #e5e7eb;
        }

        .btn-confirm {
            background: #4a90d9;
            color: white;
        }

        .btn-confirm:hover {
            background: #3a7bc8;
        }

        .btn-confirm.danger {
            background: #dc2626;
        }

        .btn-confirm.danger:hover {
            background: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Chat Bot</h1>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="typing-indicator" id="typingIndicator">AI 正在输入...</div>
        </div>
        
        <div class="chat-input-container">
            <input 
                type="text" 
                class="chat-input" 
                id="messageInput" 
                placeholder="输入消息..."
                autocomplete="off"
            >
            <button class="send-button" id="sendButton">发送</button>
        </div>
    </div>

    <!-- 命令确认对话框 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-dialog">
            <div class="modal-header" id="modalHeader">
                <span class="modal-icon" id="modalIcon">📋</span>
                <span class="modal-title" id="modalTitle">命令确认</span>
            </div>
            <div class="modal-body">
                <div class="danger-warning" id="dangerWarning" style="display: none;">
                    <span class="danger-warning-icon">⚠️</span>
                    <span id="dangerReason"></span>
                </div>
                <div class="command-info">
                    <div class="command-info-row">
                        <span class="command-info-label">操作类型:</span>
                        <span class="command-info-value" id="cmdOperation">-</span>
                    </div>
                    <div class="command-info-row">
                        <span class="command-info-label">执行路径:</span>
                        <span class="command-info-value" id="cmdWorkingDir">-</span>
                    </div>
                    <div class="command-info-row">
                        <span class="command-info-label">命令内容:</span>
                    </div>
                    <div class="command-box" id="cmdContent">-</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" id="btnCancel">取消</button>
                <button class="btn btn-confirm" id="btnConfirm">确认执行</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');
        
        // 确认对话框元素
        const confirmModal = document.getElementById('confirmModal');
        const modalHeader = document.getElementById('modalHeader');
        const modalIcon = document.getElementById('modalIcon');
        const modalTitle = document.getElementById('modalTitle');
        const dangerWarning = document.getElementById('dangerWarning');
        const dangerReason = document.getElementById('dangerReason');
        const cmdOperation = document.getElementById('cmdOperation');
        const cmdWorkingDir = document.getElementById('cmdWorkingDir');
        const cmdContent = document.getElementById('cmdContent');
        const btnCancel = document.getElementById('btnCancel');
        const btnConfirm = document.getElementById('btnConfirm');

        // 当前待确认的命令信息
        let pendingCommand = null;
        let pendingUserMessage = null;
        let currentMessageElement = null;

        // 配置 marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (e) {}
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,  // 支持 GitHub 风格的换行
            gfm: true      // 支持 GitHub Flavored Markdown
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            // 先转义 HTML，然后解析 Markdown
            return marked.parse(text);
        }

        function addMessage(content, role, isMarkdown = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (isMarkdown && role === 'assistant') {
                contentDiv.innerHTML = renderMarkdown(content);
                // 高亮代码块
                contentDiv.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            } else {
                contentDiv.textContent = content;
            }
            
            messageDiv.appendChild(contentDiv);
            chatMessages.insertBefore(messageDiv, typingIndicator);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return contentDiv;
        }

        function updateMessage(element, content) {
            element.innerHTML = renderMarkdown(content);
            // 高亮代码块
            element.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showConfirmDialog(commandData, userMessage, messageElement) {
            // 保存当前状态
            pendingCommand = commandData;
            pendingUserMessage = userMessage;
            currentMessageElement = messageElement;

            // 设置对话框内容
            cmdOperation.textContent = commandData.operation || '执行命令';
            cmdWorkingDir.textContent = commandData.working_dir || '-';
            cmdContent.textContent = commandData.command || '-';

            // 根据是否危险设置样式
            if (commandData.is_dangerous) {
                modalHeader.className = 'modal-header danger';
                modalIcon.textContent = '⚠️';
                modalTitle.textContent = '危险命令确认';
                dangerWarning.style.display = 'block';
                dangerReason.textContent = commandData.reason || '此命令可能对系统造成影响';
                btnConfirm.className = 'btn btn-confirm danger';
            } else {
                modalHeader.className = 'modal-header warning';
                modalIcon.textContent = '📋';
                modalTitle.textContent = '命令确认';
                dangerWarning.style.display = 'none';
                btnConfirm.className = 'btn btn-confirm';
            }

            // 显示对话框
            confirmModal.classList.add('show');
        }

        function hideConfirmDialog() {
            confirmModal.classList.remove('show');
            pendingCommand = null;
            pendingUserMessage = null;
            currentMessageElement = null;
        }

        async function handleConfirm() {
            if (!pendingCommand) return;

            const command = pendingCommand.command;
            const userMessage = pendingUserMessage;
            const messageElement = currentMessageElement;

            hideConfirmDialog();

            // 更新消息显示
            if (messageElement) {
                messageElement.innerHTML = renderMarkdown('⏳ 用户已确认，正在执行命令...');
            }

            try {
                // 发送确认请求
                const confirmResponse = await fetch('/confirm/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        command: command,
                        user_message: userMessage
                    })
                });

                const reader = confirmResponse.body.getReader();
                const decoder = new TextDecoder();
                
                let assistantMessage = '';

                // 读取流式数据
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                
                                if (data.type === 'content') {
                                    assistantMessage = data.accumulated;
                                    if (messageElement) {
                                        updateMessage(messageElement, assistantMessage);
                                    }
                                } else if (data.type === 'tool_result') {
                                    if (messageElement) {
                                        updateMessage(messageElement, data.content);
                                    }
                                } else if (data.type === 'done') {
                                    if (messageElement && data.content) {
                                        updateMessage(messageElement, data.content);
                                    }
                                } else if (data.type === 'error') {
                                    if (messageElement) {
                                        updateMessage(messageElement, '❌ 错误: ' + data.content);
                                    }
                                }
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('Confirm error:', error);
                if (messageElement) {
                    updateMessage(messageElement, '❌ 执行命令失败: ' + error.message);
                }
            }

            sendButton.disabled = false;
            messageInput.focus();
        }

        async function handleCancel() {
            if (!pendingCommand) return;

            const command = pendingCommand.command;
            const userMessage = pendingUserMessage;
            const messageElement = currentMessageElement;

            hideConfirmDialog();

            // 更新消息显示
            if (messageElement) {
                messageElement.innerHTML = renderMarkdown('❌ 用户取消执行命令');
            }

            try {
                // 发送取消请求，让 LLM 继续处理
                const cancelResponse = await fetch('/cancel', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        command: command,
                        user_message: userMessage
                    })
                });

                const reader = cancelResponse.body.getReader();
                const decoder = new TextDecoder();
                
                let assistantMessage = '';

                // 读取流式数据
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                
                                if (data.type === 'content') {
                                    assistantMessage = data.accumulated;
                                    if (messageElement) {
                                        updateMessage(messageElement, assistantMessage);
                                    }
                                } else if (data.type === 'done') {
                                    if (messageElement && data.content) {
                                        updateMessage(messageElement, data.content);
                                    }
                                } else if (data.type === 'error') {
                                    if (messageElement) {
                                        updateMessage(messageElement, '❌ 错误: ' + data.content);
                                    }
                                }
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('Cancel error:', error);
                if (messageElement) {
                    updateMessage(messageElement, '用户已取消命令执行。');
                }
            }

            sendButton.disabled = false;
            messageInput.focus();
        }

        // 绑定确认对话框按钮事件
        btnCancel.addEventListener('click', handleCancel);
        btnConfirm.addEventListener('click', handleConfirm);

        // 点击遮罩层关闭（视为取消）
        confirmModal.addEventListener('click', (e) => {
            if (e.target === confirmModal) {
                handleCancel();
            }
        });

        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            // 添加用户消息
            addMessage(content, 'user', false);
            
            messageInput.value = '';
            sendButton.disabled = true;
            typingIndicator.classList.add('show');

            try {
                // 使用流式接口
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: content })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                let assistantMessage = '';
                let messageElement = null;

                // 读取流式数据
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                
                                if (data.type === 'content') {
                                    // 流式内容
                                    typingIndicator.classList.remove('show');
                                    
                                    assistantMessage = data.accumulated;
                                    
                                    if (!messageElement) {
                                        messageElement = addMessage('', 'assistant');
                                    }
                                    
                                    updateMessage(messageElement, assistantMessage);
                                    
                                } else if (data.type === 'confirmation_required' || data.type === 'dangerous_command') {
                                    // 需要确认的命令，显示确认对话框
                                    typingIndicator.classList.remove('show');
                                    
                                    if (!messageElement) {
                                        messageElement = addMessage('', 'assistant');
                                    }
                                    
                                    // 显示确认对话框
                                    showConfirmDialog(data, content, messageElement);
                                    return; // 等待用户确认/取消
                                    
                                } else if (data.type === 'done') {
                                    // 流结束
                                    if (messageElement && data.content) {
                                        updateMessage(messageElement, data.content);
                                    }
                                    
                                } else if (data.type === 'error') {
                                    // 错误处理
                                    typingIndicator.classList.remove('show');
                                    addMessage(data.content, 'assistant');
                                }
                                
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }

            } catch (error) {
                console.error('Error:', error);
                typingIndicator.classList.remove('show');
                addMessage('发生错误，请重试', 'assistant');
            }

            sendButton.disabled = false;
            messageInput.focus();
        }

        sendButton.addEventListener('click', sendMessage);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.focus();
    </script>
</body>
</html>
