<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MalogBot</title>
    <!-- Markdown 解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 代码高亮库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 280px;
            background: #2d3748;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #4a5568;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
        }

        .new-chat-btn {
            background: #4a90d9;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #3a7bc8;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .session-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .session-item:hover {
            background: #4a5568;
        }

        .session-item.active {
            background: #4a90d9;
        }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        .session-title {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-meta {
            font-size: 11px;
            color: #a0aec0;
            margin-top: 4px;
        }

        .session-item.active .session-meta {
            color: rgba(255, 255, 255, 0.7);
        }

        .session-actions {
            display: none;
            gap: 4px;
        }

        .session-item:hover .session-actions {
            display: flex;
        }

        .session-item.active:hover .session-actions {
            display: flex;
        }

        .session-action-btn {
            background: transparent;
            border: none;
            color: #a0aec0;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .session-action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .session-action-btn.delete:hover {
            color: #fc8181;
        }

        /* 主聊天区域 */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            height: 100vh;
        }

        .chat-header {
            padding: 20px;
            background: #4a90d9;
            color: white;
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #4a90d9;
            color: white;
        }

        .message.assistant .message-content {
            background: #e9ecef;
            color: #333;
        }

        /* Markdown 渲染样式 */
        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4,
        .message-content h5,
        .message-content h6 {
            margin-top: 1em;
            margin-bottom: 0.5em;
            font-weight: bold;
        }

        .message-content h1 { font-size: 1.5em; }
        .message-content h2 { font-size: 1.3em; }
        .message-content h3 { font-size: 1.1em; }

        .message-content p {
            margin: 0.5em 0;
            white-space: pre-wrap;
        }

        .message-content ul,
        .message-content ol {
            margin: 0.5em 0;
            padding-left: 1.5em;
        }

        .message-content li {
            margin: 0.25em 0;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
        }

        .message-content pre {
            margin: 0.5em 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .message-content pre code {
            display: block;
            padding: 12px;
            background: #1e1e1e;
            color: #d4d4d4;
            overflow-x: auto;
            font-size: 0.85em;
            line-height: 1.5;
        }

        .message-content blockquote {
            margin: 0.5em 0;
            padding: 0.5em 1em;
            border-left: 3px solid #4a90d9;
            background: rgba(74, 144, 217, 0.1);
        }

        .message-content table {
            border-collapse: collapse;
            margin: 0.5em 0;
            width: 100%;
        }

        .message-content th,
        .message-content td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        .message-content th {
            background: #f5f5f5;
        }

        .message-content a {
            color: #4a90d9;
            text-decoration: none;
        }

        .message-content a:hover {
            text-decoration: underline;
        }

        .message-content hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 1em 0;
        }

        /* 用户消息中的代码块样式 */
        .message.user .message-content code {
            background: rgba(255, 255, 255, 0.2);
        }

        .message.user .message-content pre code {
            background: rgba(0, 0, 0, 0.3);
        }

        .chat-input-container {
            padding: 20px;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }

        .chat-input:focus {
            border-color: #4a90d9;
        }

        .send-button {
            padding: 12px 24px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
        }

        .send-button:hover {
            background: #3a7bc8;
        }

        .send-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .stop-button {
            padding: 12px 24px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
            display: none;
        }

        .stop-button:hover {
            background: #c82333;
        }

        .stop-button.show {
            display: block;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: #e9ecef;
            border-radius: 16px;
            margin-bottom: 16px;
            width: fit-content;
        }

        .typing-indicator.show {
            display: block;
        }

        /* 内联命令确认卡片样式 */
        .command-confirm-card {
            margin-top: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            font-size: 13px;
        }

        .command-confirm-card.danger {
            border-color: #fecaca;
        }

        .command-confirm-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #f8f9fa;
            border-bottom: 1px solid #e5e7eb;
        }

        .command-confirm-card.danger .command-confirm-header {
            background: #fef2f2;
            border-bottom-color: #fecaca;
        }

        .command-confirm-path {
            color: #666;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 11px;
        }

        .command-confirm-actions {
            display: flex;
            gap: 6px;
        }

        .command-confirm-btn {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .command-confirm-btn.cancel {
            background: #f3f4f6;
            color: #374151;
        }

        .command-confirm-btn.cancel:hover {
            background: #e5e7eb;
        }

        .command-confirm-btn.confirm {
            background: #4a90d9;
            color: white;
        }

        .command-confirm-btn.confirm:hover {
            background: #3a7bc8;
        }

        .command-confirm-card.danger .command-confirm-btn.confirm {
            background: #dc2626;
        }

        .command-confirm-card.danger .command-confirm-btn.confirm:hover {
            background: #b91c1c;
        }

        .command-confirm-body {
            padding: 10px 12px;
        }

        .command-confirm-warning {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #dc2626;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .command-confirm-command {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 8px 10px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 执行中状态 */
        .command-confirm-card.executing {
            opacity: 0.7;
            pointer-events: none;
        }

        .command-confirm-card.executing .command-confirm-btn {
            cursor: default;
        }

        /* 已处理状态 */
        .command-confirm-card.confirmed .command-confirm-actions::before {
            content: '✅ 已执行';
            font-size: 12px;
            color: #16a34a;
        }

        .command-confirm-card.cancelled .command-confirm-actions::before {
            content: '❌ 已取消';
            font-size: 12px;
            color: #dc2626;
        }

        .command-confirm-card.confirmed .command-confirm-btn,
        .command-confirm-card.cancelled .command-confirm-btn {
            display: none;
        }

        /* 空状态提示 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0aec0;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* ==================== 欢迎页样式 ==================== */
        .welcome-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            height: 100vh;
            padding: 40px 20px;
        }

        .welcome-page.hidden {
            display: none;
        }

        .welcome-logo {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 12px;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: #718096;
            margin-bottom: 40px;
            text-align: center;
        }

        .welcome-input-container {
            width: 100%;
            max-width: 600px;
            position: relative;
            margin-bottom: 40px;
        }

        .welcome-input {
            width: 100%;
            padding: 16px 60px 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .welcome-input:focus {
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
        }

        .welcome-send-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #4a90d9;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .welcome-send-btn:hover {
            background: #3a7bc8;
        }

        .welcome-send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .history-section {
            width: 100%;
            max-width: 600px;
        }

        .history-title {
            font-size: 14px;
            color: #718096;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: #f7fafc;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: #edf2f7;
            border-color: #e2e8f0;
        }

        .history-item-icon {
            font-size: 20px;
            margin-right: 12px;
        }

        .history-item-content {
            flex: 1;
            min-width: 0;
        }

        .history-item-title {
            font-size: 14px;
            color: #2d3748;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item-meta {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 2px;
        }

        .history-item-action {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .history-item:hover .history-item-action {
            opacity: 1;
        }

        .history-delete-btn {
            background: transparent;
            border: none;
            color: #a0aec0;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .history-delete-btn:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        .no-history {
            text-align: center;
            color: #a0aec0;
            padding: 20px;
            font-size: 14px;
        }

        /* 隐藏聊天界面 */
        .chat-interface {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-interface.hidden {
            display: none;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                z-index: 1000;
                transition: left 0.3s;
            }

            .sidebar.open {
                left: 0;
            }

            .welcome-page {
                padding: 20px;
            }

            .welcome-title {
                font-size: 24px;
            }

            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">💬 对话列表</span>
            <button class="new-chat-btn" id="newChatBtnSidebar" title="新建对话">
                <span>➕</span>
            </button>
        </div>
        <div class="session-list" id="sessionList">
            <!-- 会话列表将通过JS动态生成 -->
        </div>
    </div>

    <!-- 欢迎页 -->
    <div class="welcome-page" id="welcomePage">
        <div class="welcome-logo">🤖</div>
        <h1 class="welcome-title">MalogBot</h1>
        <p class="welcome-subtitle">您的智能助手，随时准备为您解答问题</p>
        
        <div class="welcome-input-container">
            <input 
                type="text" 
                class="welcome-input" 
                id="welcomeInput" 
                placeholder="输入您的问题，开始新对话..."
                autocomplete="off"
            >
            <button class="welcome-send-btn" id="welcomeSendBtn">➤</button>
        </div>
        
        <div class="history-section" id="historySection">
            <div class="history-title">
                <span>📜</span>
                <span>历史对话</span>
            </div>
            <div class="history-list" id="historyList">
                <!-- 历史对话列表将通过JS动态生成 -->
            </div>
        </div>
    </div>

    <!-- 聊天界面 -->
    <div class="chat-interface hidden" id="chatInterface">
        <div class="chat-header">
            <h1>🤖 MalogBot</h1>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="typing-indicator" id="typingIndicator">AI 正在输入...</div>
        </div>
        
        <div class="chat-input-container">
            <input 
                type="text" 
                class="chat-input" 
                id="messageInput" 
                placeholder="输入消息..."
                autocomplete="off"
            >
            <button class="send-button" id="sendButton">发送</button>
            <button class="stop-button" id="stopButton">停止</button>
        </div>
    </div>

    <script>
        // DOM 元素
        const welcomePage = document.getElementById('welcomePage');
        const chatInterface = document.getElementById('chatInterface');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const stopButton = document.getElementById('stopButton');
        const typingIndicator = document.getElementById('typingIndicator');
        const sidebar = document.getElementById('sidebar');
        const sessionList = document.getElementById('sessionList');
        const newChatBtnSidebar = document.getElementById('newChatBtnSidebar');
        const welcomeInput = document.getElementById('welcomeInput');
        const welcomeSendBtn = document.getElementById('welcomeSendBtn');
        const historyList = document.getElementById('historyList');
        
        // 保存当前对话的原始用户消息，用于多步骤确认
        let currentOriginalUserMessage = '';

        // 用于取消请求的 AbortController
        let currentAbortController = null;

        // 当前会话ID
        let currentSessionId = null;

        // 是否处于欢迎页
        let isWelcomeMode = true;

        // 会话列表缓存
        let sessionsCache = [];

        // 配置 marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (e) {}
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            return marked.parse(text);
        }

        function addMessage(content, role, isMarkdown = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (isMarkdown && role === 'assistant') {
                contentDiv.innerHTML = renderMarkdown(content);
                contentDiv.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            } else {
                contentDiv.textContent = content;
            }
            
            messageDiv.appendChild(contentDiv);
            chatMessages.insertBefore(messageDiv, typingIndicator);
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return contentDiv;
        }

        function updateMessage(element, content) {
            element.innerHTML = renderMarkdown(content);
            element.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 显示停止按钮，隐藏发送按钮
        function showStopButton() {
            sendButton.style.display = 'none';
            stopButton.classList.add('show');
        }

        // 隐藏停止按钮，显示发送按钮
        function hideStopButton() {
            sendButton.style.display = 'block';
            stopButton.classList.remove('show');
        }

        // 显示欢迎页
        function showWelcomePage() {
            isWelcomeMode = true;
            welcomePage.classList.remove('hidden');
            chatInterface.classList.add('hidden');
            currentSessionId = null;
            renderSessionList(); // 更新侧边栏高亮
            renderHistoryList(); // 更新欢迎页历史列表
            welcomeInput.focus();
        }

        // 显示聊天界面
        function showChatInterface() {
            isWelcomeMode = false;
            welcomePage.classList.add('hidden');
            chatInterface.classList.remove('hidden');
            messageInput.focus();
            // 切换到聊天界面后重新渲染会话列表，确保高亮正确
            renderSessionList();
        }

        // 停止生成
        async function stopGeneration() {
            if (currentAbortController) {
                // 调用后端取消接口
                try {
                    await fetch('/stop', { method: 'POST' });
                } catch (e) {
                    console.error('Stop request error:', e);
                }
                // 取消前端请求
                currentAbortController.abort();
                currentAbortController = null;
            }
            
            hideStopButton();
            sendButton.disabled = false;
            typingIndicator.classList.remove('show');
            messageInput.focus();
        }

        // 流式读取并处理响应的通用函数
        async function streamReader(reader, messageElement, onDone) {
            const decoder = new TextDecoder();
            let assistantMessage = '';

            try {
                while (true) {
                    // 检查是否被取消
                    if (!currentAbortController) {
                        break;
                    }
                    
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                
                                if (data.type === 'content') {
                                    assistantMessage = data.accumulated;
                                    updateMessage(messageElement, assistantMessage);
                                } else if (data.type === 'tool_result') {
                                    updateMessage(messageElement, data.content);
                                } else if (data.type === 'cancelled') {
                                    // 用户取消了输出
                                    if (data.content) {
                                        updateMessage(messageElement, data.content);
                                    }
                                    // 在消息末尾添加取消标记
                                    const cancelDiv = document.createElement('div');
                                    cancelDiv.style.cssText = 'margin-top: 8px; padding: 4px 8px; background: #fef3cd; border-radius: 4px; font-size: 12px; color: #856404;';
                                    cancelDiv.textContent = '⏹️ 输出已停止';
                                    messageElement.appendChild(cancelDiv);
                                    return;
                                } else if (data.type === 'confirmation_required' || data.type === 'dangerous_command') {
                                    // 需要用户确认命令
                                    // 使用保存的原始用户消息，而不是助手响应
                                    appendConfirmCard(messageElement, data, currentOriginalUserMessage);
                                    hideStopButton();
                                    sendButton.disabled = false;
                                    return;
                                } else if (data.type === 'done') {
                                    if (data.content && !assistantMessage) {
                                        updateMessage(messageElement, data.content);
                                    }
                                } else if (data.type === 'error') {
                                    updateMessage(messageElement, '❌ 错误: ' + data.content);
                                }
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Request aborted by user');
                } else {
                    console.error('Stream error:', error);
                }
            }
            
            if (onDone) onDone();
        }

        function createConfirmCard(commandData, userMessage) {
            const card = document.createElement('div');
            card.className = 'command-confirm-card' + (commandData.is_dangerous ? ' danger' : '');
            card.dataset.command = commandData.command;
            card.dataset.userMessage = userMessage;

            // 构建卡片内容
            let cardHtml = `
                <div class="command-confirm-header">
                    <span class="command-confirm-path">📁 ${escapeHtml(commandData.working_dir || '-')}</span>
                    <div class="command-confirm-actions">
                        <button class="command-confirm-btn cancel">取消</button>
                        <button class="command-confirm-btn confirm">执行</button>
                    </div>
                </div>
                <div class="command-confirm-body">
            `;

            if (commandData.is_dangerous && commandData.reason) {
                cardHtml += `
                    <div class="command-confirm-warning">
                        <span>⚠️</span>
                        <span>${escapeHtml(commandData.reason)}</span>
                    </div>
                `;
            }

            cardHtml += `
                    <div class="command-confirm-command">${escapeHtml(commandData.command)}</div>
                </div>
            `;

            card.innerHTML = cardHtml;

            // 绑定按钮事件
            const cancelBtn = card.querySelector('.command-confirm-btn.cancel');
            const confirmBtn = card.querySelector('.command-confirm-btn.confirm');

            cancelBtn.addEventListener('click', () => handleCancel(card));
            confirmBtn.addEventListener('click', () => handleConfirm(card));

            return card;
        }

        function appendConfirmCard(messageElement, commandData, userMessage) {
            // 移除已有的确认卡片
            const existingCard = messageElement.querySelector('.command-confirm-card:not(.confirmed):not(.cancelled)');
            if (existingCard) {
                existingCard.remove();
            }

            // 创建并追加新的确认卡片
            const card = createConfirmCard(commandData, userMessage);
            messageElement.appendChild(card);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function handleConfirm(card) {
            const command = card.dataset.command;
            const userMessage = card.dataset.userMessage;

            // 更新卡片状态为执行中
            card.classList.add('executing');
            card.querySelector('.command-confirm-btn.confirm').textContent = '执行中...';

            // 标记卡片为已执行（这样状态就固定了）
            card.classList.remove('executing');
            card.classList.add('confirmed');

            // 创建新的消息用于显示后续输出
            const newMessageElement = addMessage('', 'assistant');
            
            // 创建新的 AbortController 并显示停止按钮
            currentAbortController = new AbortController();
            showStopButton();

            try {
                const confirmResponse = await fetch('/confirm/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        command: command,
                        user_message: userMessage
                    }),
                    signal: currentAbortController.signal
                });

                const reader = confirmResponse.body.getReader();
                
                await streamReader(reader, newMessageElement, () => {
                    hideStopButton();
                    sendButton.disabled = false;
                    currentAbortController = null;
                    messageInput.focus();
                    loadSessions(); // 刷新会话列表
                });
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Confirm request aborted by user');
                } else {
                    console.error('Confirm error:', error);
                    updateMessage(newMessageElement, '❌ 执行命令失败: ' + error.message);
                }
                hideStopButton();
                sendButton.disabled = false;
                currentAbortController = null;
                messageInput.focus();
            }
        }

        async function handleCancel(card) {
            const command = card.dataset.command;
            const userMessage = card.dataset.userMessage;

            // 标记卡片为已取消（状态固定）
            card.classList.add('cancelled');
            card.classList.remove('danger');

            // 创建新的消息用于显示后续输出
            const newMessageElement = addMessage('', 'assistant');
            
            // 创建新的 AbortController 并显示停止按钮
            currentAbortController = new AbortController();
            showStopButton();

            try {
                const cancelResponse = await fetch('/cancel', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        command: command,
                        user_message: userMessage
                    }),
                    signal: currentAbortController.signal
                });

                const reader = cancelResponse.body.getReader();
                
                await streamReader(reader, newMessageElement, () => {
                    hideStopButton();
                    sendButton.disabled = false;
                    currentAbortController = null;
                    messageInput.focus();
                    loadSessions(); // 刷新会话列表
                });
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('Cancel request aborted by user');
                } else {
                    console.error('Cancel error:', error);
                    updateMessage(newMessageElement, '用户已取消命令执行。');
                }
                hideStopButton();
                sendButton.disabled = false;
                currentAbortController = null;
                messageInput.focus();
            }
        }

        // 发送消息的核心函数
        async function sendMessageWithInput(content, isNewSession = false) {
            if (!content) return;

            // 保存原始用户消息，用于后续确认
            currentOriginalUserMessage = content;
            
            // 如果是新会话，先创建会话
            if (isNewSession || !currentSessionId) {
                await createNewSession(false);
            }
            
            // 显示聊天界面
            showChatInterface();
            
            // 添加用户消息
            addMessage(content, 'user', false);
            
            messageInput.value = '';
            sendButton.disabled = true;
            typingIndicator.classList.add('show');
            
            // 创建新的 AbortController
            currentAbortController = new AbortController();
            
            // 显示停止按钮
            showStopButton();

            try {
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: content }),
                    signal: currentAbortController.signal
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                let assistantMessage = '';
                let messageElement = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                
                                if (data.type === 'content') {
                                    typingIndicator.classList.remove('show');
                                    
                                    assistantMessage = data.accumulated;
                                    
                                    if (!messageElement) {
                                        messageElement = addMessage('', 'assistant');
                                    }
                                    
                                    updateMessage(messageElement, assistantMessage);
                                    
                                } else if (data.type === 'cancelled') {
                                    // 用户取消了输出
                                    typingIndicator.classList.remove('show');
                                    if (data.content && !messageElement) {
                                        messageElement = addMessage('', 'assistant');
                                        updateMessage(messageElement, data.content);
                                    }
                                    if (messageElement) {
                                        // 在消息末尾添加取消标记
                                        const cancelDiv = document.createElement('div');
                                        cancelDiv.style.cssText = 'margin-top: 8px; padding: 4px 8px; background: #fef3cd; border-radius: 4px; font-size: 12px; color: #856404;';
                                        cancelDiv.textContent = '⏹️ 输出已停止';
                                        messageElement.appendChild(cancelDiv);
                                    }
                                    return;
                                    
                                } else if (data.type === 'confirmation_required' || data.type === 'dangerous_command') {
                                    typingIndicator.classList.remove('show');
                                    
                                    if (!messageElement) {
                                        messageElement = addMessage('', 'assistant');
                                    }
                                    
                                    // 追加内联确认卡片
                                    appendConfirmCard(messageElement, data, content);
                                    hideStopButton();
                                    sendButton.disabled = false;
                                    return;
                                    
                                } else if (data.type === 'done') {
                                    if (messageElement && data.content) {
                                        updateMessage(messageElement, data.content);
                                    }
                                    
                                } else if (data.type === 'error') {
                                    typingIndicator.classList.remove('show');
                                    addMessage(data.content, 'assistant');
                                }
                                
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }

                // 发送完成后刷新会话列表
                loadSessions();

            } catch (error) {
                if (error.name === 'AbortError') {
                    // 用户主动取消，不显示错误
                    console.log('Request aborted by user');
                } else {
                    console.error('Error:', error);
                    typingIndicator.classList.remove('show');
                    addMessage('发生错误，请重试', 'assistant');
                }
            }

            hideStopButton();
            sendButton.disabled = false;
            currentAbortController = null;
            messageInput.focus();
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            await sendMessageWithInput(content, false);
        }

        // ==================== 会话管理 ====================

        // 加载会话列表
        async function loadSessions() {
            try {
                const response = await fetch('/sessions');
                const data = await response.json();
                
                sessionsCache = data.sessions || [];
                // 后端返回的 current_session_id
                const backendSessionId = data.current_session_id;
                
                // 在非欢迎页模式下，如果后端返回了有效的 session_id，使用它
                if (!isWelcomeMode && backendSessionId) {
                    currentSessionId = backendSessionId;
                }
                
                // 在欢迎页模式下，检查是否需要自动切换到已有会话
                if (isWelcomeMode && backendSessionId) {
                    const currentSession = sessionsCache.find(s => s.session_id === backendSessionId);
                    if (currentSession && currentSession.message_count > 0) {
                        // 有消息的会话，显示聊天界面
                        currentSessionId = backendSessionId;
                        await loadSessionHistory(backendSessionId);
                        showChatInterface();
                    }
                }
                
                renderSessionList();
                renderHistoryList();
            } catch (error) {
                console.error('Load sessions error:', error);
            }
        }

        // 渲染侧边栏会话列表
        function renderSessionList() {
            sessionList.innerHTML = '';
            
            if (sessionsCache.length === 0) {
                sessionList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div class="empty-state-text">暂无对话记录<br>点击"+"开始聊天</div>
                    </div>
                `;
                return;
            }
            
            sessionsCache.forEach(session => {
                const item = document.createElement('div');
                item.className = 'session-item' + (session.session_id === currentSessionId && !isWelcomeMode ? ' active' : '');
                item.dataset.sessionId = session.session_id;
                
                // 格式化时间
                const updatedAt = new Date(session.updated_at);
                const timeStr = formatTime(updatedAt);
                
                // 获取会话标题（使用第一条用户消息或默认标题）
                const title = `对话 ${session.session_id.substring(0, 8)}`;
                
                item.innerHTML = `
                    <div class="session-info">
                        <div class="session-title">${escapeHtml(title)}</div>
                        <div class="session-meta">${timeStr} · ${session.message_count} 条消息</div>
                    </div>
                    <div class="session-actions">
                        <button class="session-action-btn delete" title="删除对话">🗑️</button>
                    </div>
                `;
                
                // 点击切换会话
                item.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('session-action-btn')) {
                        switchToSession(session.session_id);
                    }
                });
                
                // 删除按钮
                const deleteBtn = item.querySelector('.session-action-btn.delete');
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSession(session.session_id);
                });
                
                sessionList.appendChild(item);
            });
        }

        // 渲染欢迎页历史列表
        function renderHistoryList() {
            // 过滤出有消息的会话
            const sessionsWithMessages = sessionsCache.filter(s => s.message_count > 0);
            
            historyList.innerHTML = '';
            
            if (sessionsWithMessages.length === 0) {
                historyList.innerHTML = '<div class="no-history">暂无历史对话</div>';
                return;
            }
            
            sessionsWithMessages.forEach(session => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.dataset.sessionId = session.session_id;
                
                // 格式化时间
                const updatedAt = new Date(session.updated_at);
                const timeStr = formatTime(updatedAt);
                
                // 获取会话标题
                const title = `对话 ${session.session_id.substring(0, 8)}`;
                
                item.innerHTML = `
                    <span class="history-item-icon">💬</span>
                    <div class="history-item-content">
                        <div class="history-item-title">${escapeHtml(title)}</div>
                        <div class="history-item-meta">${timeStr} · ${session.message_count} 条消息</div>
                    </div>
                    <div class="history-item-action">
                        <button class="history-delete-btn" title="删除">🗑️</button>
                    </div>
                `;
                
                // 点击进入会话
                item.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('history-delete-btn')) {
                        switchToSession(session.session_id);
                    }
                });
                
                // 删除按钮
                const deleteBtn = item.querySelector('.history-delete-btn');
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSession(session.session_id);
                });
                
                historyList.appendChild(item);
            });
        }

        // 格式化时间
        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
            
            return date.toLocaleDateString('zh-CN');
        }

        // 创建新会话
        async function createNewSession(switchToChat = true) {
            try {
                const response = await fetch('/sessions/new', { method: 'POST' });
                const data = await response.json();
                
                if (data.session_id) {
                    currentSessionId = data.session_id;
                    clearChatMessages();
                    
                    if (switchToChat) {
                        showChatInterface();
                    }
                    
                    await loadSessions();
                }
            } catch (error) {
                console.error('Create session error:', error);
            }
        }

        // 删除会话
        async function deleteSession(sessionId) {
            if (!confirm('确定要删除这个对话吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`/sessions/${sessionId}`, { method: 'DELETE' });
                const data = await response.json();
                
                if (data.status === 'ok') {
                    // 如果删除的是当前会话，返回欢迎页
                    if (sessionId === currentSessionId) {
                        showWelcomePage();
                    }
                    await loadSessions();
                } else {
                    alert(data.error || '删除失败');
                }
            } catch (error) {
                console.error('Delete session error:', error);
            }
        }

        // 切换会话
        async function switchToSession(sessionId) {
            if (sessionId === currentSessionId && !isWelcomeMode) {
                return;
            }
            
            try {
                const response = await fetch(`/sessions/${sessionId}/switch`, { method: 'POST' });
                const data = await response.json();
                
                if (data.status === 'ok') {
                    currentSessionId = sessionId;
                    clearChatMessages();
                    await loadSessionHistory(sessionId);
                    showChatInterface();
                    await loadSessions();
                }
            } catch (error) {
                console.error('Switch session error:', error);
            }
        }

        // 加载会话历史消息
        async function loadSessionHistory(sessionId) {
            try {
                const response = await fetch(`/sessions/${sessionId}/info`);
                const data = await response.json();
                
                if (data.messages) {
                    clearChatMessages();
                    data.messages.forEach(msg => {
                        addMessage(msg.content, msg.role);
                    });
                }
            } catch (error) {
                console.error('Load session history error:', error);
            }
        }

        // 清空聊天消息
        function clearChatMessages() {
            const messages = chatMessages.querySelectorAll('.message');
            messages.forEach(msg => msg.remove());
        }

        // ==================== 事件绑定 ====================

        // 欢迎页输入框发送
        welcomeSendBtn.addEventListener('click', () => {
            const content = welcomeInput.value.trim();
            if (content) {
                sendMessageWithInput(content, true);
                welcomeInput.value = '';
            }
        });

        welcomeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const content = welcomeInput.value.trim();
                if (content) {
                    sendMessageWithInput(content, true);
                    welcomeInput.value = '';
                }
            }
        });

        // 侧边栏新建按钮
        newChatBtnSidebar.addEventListener('click', () => {
            showWelcomePage();
            welcomeInput.focus();
        });

        // 聊天界面发送
        sendButton.addEventListener('click', sendMessage);
        stopButton.addEventListener('click', stopGeneration);
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 初始化
        loadSessions();
    </script>
</body>
